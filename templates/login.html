<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LEGO Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap { width: 100%; max-width: 400px; padding: 1rem; }
        .login-card {
            background: #fff;
            border-radius: 20px;
            border: none;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
            padding: 2.5rem 2rem;
        }
        .logo-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #2563EB, #7C3AED);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(37,99,235,0.35);
        }
        .form-label { font-size: .8rem; font-weight: 700;
                      text-transform: uppercase; letter-spacing: .06em;
                      color: #64748B; margin-bottom: .4rem; }
        .input-group-text {
            background: #F8FAFC; border: 1.5px solid #E2E8F0;
            border-right: none; color: #94A3B8;
        }
        .form-control {
            background: #F8FAFC; border: 1.5px solid #E2E8F0;
            border-left: none; font-size: .9rem; padding: .55rem .75rem;
        }
        .form-control:focus {
            background: #fff; border-color: #2563EB; box-shadow: none;
            outline: none;
        }
        .form-control:focus ~ .input-group-text,
        .input-group:focus-within .input-group-text { border-color: #2563EB; }
        .show-btn {
            background: #F8FAFC; border: 1.5px solid #E2E8F0;
            border-left: none; color: #94A3B8; padding: 0 .75rem;
            cursor: pointer; transition: background .15s;
        }
        .show-btn:hover { background: #E2E8F0; }
        .btn-login {
            background: linear-gradient(135deg, #2563EB, #7C3AED);
            color: #fff; border: none; border-radius: 12px;
            font-weight: 700; font-size: .95rem; padding: .7rem;
            width: 100%; letter-spacing: .02em;
            transition: opacity .15s, transform .1s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.4);
        }
        .btn-login:hover { opacity: .9; transform: translateY(-1px); }
        .alert { border: none; border-radius: 12px; font-size: .875rem; }
        .divider { border-color: #E2E8F0; margin: 1.5rem 0 1.25rem; }
    </style>
</head>
<body>
<div class="login-wrap">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'info' }} alert-dismissible fade show mb-3" role="alert">
            <i class="bi bi-{{ 'check-circle' if category == 'success' else 'exclamation-triangle' if category == 'danger' else 'exclamation-circle' }} me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="logo-icon">🤖</div>
            <h2 class="fw-bolder mb-1" style="letter-spacing:-.5px;font-size:1.6rem">LEGO Inventory</h2>
            <p class="text-muted small mb-0">Sistema de Gestão de Kits Educacionais</p>
        </div>

        <hr class="divider">

        <form method="POST" autocomplete="on" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person-fill" style="font-size:.95rem"></i>
                    </span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Seu usuário" required
                           autocomplete="username" autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock-fill" style="font-size:.95rem"></i>
                    </span>
                    <input type="password" name="password" id="senhaInput"
                           class="form-control" placeholder="••••••••"
                           required autocomplete="current-password">
                    <button type="button" class="show-btn" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="olhoIcon" style="font-size:.95rem"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
            </button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0" style="font-size:.78rem">
            <i class="bi bi-shield-lock-fill me-1 text-primary opacity-75"></i>
            Acesso restrito · Seus dados são protegidos
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleSenha() {
    const i = document.getElementById('senhaInput');
    const ic = document.getElementById('olhoIcon');
    const show = i.type === 'password';
    i.type = show ? 'text' : 'password';
    ic.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
}
</script>
</body>
</html>
